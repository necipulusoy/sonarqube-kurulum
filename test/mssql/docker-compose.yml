services:
  mssql:
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    container_name: sonarqube_test_mssql
    hostname: sonarqube-test-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      SONAR_DB_PASSWORD: ${SONAR_DB_PASSWORD}
    ports:
      - "${MSSQL_BIND_ADDRESS:-0.0.0.0}:${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./init-sonarqube.sql:/config/init-sonarqube.sql:ro,Z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mssql_data:
